name: Daily arXiv fetch

on:
  schedule:
    - cron: "17 6 * * *"
      timezone: "America/Chicago"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-arxiv-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package, test, and notebook dependencies
        run: python -m pip install '.[test,notebooks]'

      - name: Test before network update
        run: |
          python -c "import arxiv_kg"
          python -m pytest

      - name: Execute Notebook 2 offline
        env:
          RUN_LLM: "false"
        run: >-
          python -m jupyter nbconvert
          --to notebook
          --execute notebooks/02_feature_extractor.ipynb
          --output 02_feature_extractor.executed.ipynb
          --output-dir "${RUNNER_TEMP}"
          --ExecutePreprocessor.timeout=180

      - name: Fetch bounded daily update
        run: >-
          paper-fetcher-daily
          --db data/arxiv_kg.sqlite3
          --category cs.LG
          --max-results 200
          --first-run-lookback-hours 24
          --overlap-hours 24
          --revision-max-results 200
          --revision-first-run-lookback-hours 24

      - name: Persist successful papers and checkpoints
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/arxiv_kg.sqlite3
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update daily arXiv papers"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${DEFAULT_BRANCH}"
